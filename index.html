<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus P2P Party System</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --sidebar: #151921; --accent: #3b82f6; --text: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar für Partys */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #2d3748; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #2d3748; }
        .party-list { flex: 1; overflow-y: auto; padding: 10px; }
        .party-item { 
            padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; 
            background: #1e2532; transition: 0.2s; border: 1px solid transparent;
        }
        .party-item:hover { background: #2d3748; }
        .party-item.active { border-color: var(--accent); background: #252f3f; }

        /* Hauptbereich */
        main { flex: 1; display: flex; flex-direction: column; background: #0f172a; }
        #chat-header { padding: 15px 25px; background: var(--sidebar); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 70%; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--accent); }
        .msg.other { align-self: flex-start; background: #334155; }
        .msg-info { font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; }

        /* Input */
        .input-area { padding: 20px; background: var(--sidebar); display: flex; gap: 10px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; flex: 1; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .modal { font-size: 0.8rem; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">
        <div id="my-id" class="modal">Lade Identität...</div>
        <button onclick="createNewParty()" style="width: 100%;">+ Neue Party</button>
        <button onclick="joinPartyPrompt()" style="width: 100%; margin-top: 5px; background: #10b981;">Party beitreten</button>
    </div>
    <div id="party-list" class="party-list">
        </div>
</aside>

<main>
    <div id="chat-header">
        <h3 id="current-party-name">Wähle eine Party</h3>
        <span id="member-count">0 Member</span>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Nachricht an die Party..." onkeypress="if(event.key==='Enter') sendGroupMessage()">
        <button onclick="sendGroupMessage()">Senden</button>
    </div>
</main>

<script>
    let peer = new Peer();
    let parties = {}; // Format: { partyId: { connections: [], name: "" } }
    let activePartyId = null;

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = "ID: " + id;
    });

    // Eingehende Verbindung (Jemand tritt einer meiner Partys bei)
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if(data.type === 'join-request') {
                registerConnection(data.partyId, conn);
                // Broadcast an alle: Neuer User ist da
                broadcastToParty(data.partyId, { type: 'chat', text: `System: ${conn.peer} ist beigetreten`, user: 'System' });
            } else if(data.type === 'chat') {
                displayMessage(data.partyId, data.user, data.text, 'other');
            }
        });
    });

    function createNewParty() {
        const name = prompt("Name der Party:");
        if(!name) return;
        const partyId = peer.id + "_" + Date.now().toString().slice(-4);
        parties[partyId] = { name: name, connections: [] };
        updatePartySidebar();
        switchParty(partyId);
    }

    function joinPartyPrompt() {
        const id = prompt("Gib die Party-ID ein:");
        if(!id) return;
        const conn = peer.connect(id.split('_')[0]); // Verbinde zum Host
        conn.on('open', () => {
            parties[id] = { name: "Party " + id.slice(-4), connections: [conn] };
            conn.send({ type: 'join-request', partyId: id });
            updatePartySidebar();
            switchParty(id);
        });
    }

    function registerConnection(partyId, conn) {
        if(!parties[partyId]) parties[partyId] = { name: "Meine Party", connections: [] };
        parties[partyId].connections.push(conn);
        updatePartySidebar();
    }

    function sendGroupMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value;
        if(!text || !activePartyId) return;

        const msgObj = { type: 'chat', partyId: activePartyId, text: text, user: peer.id.substring(0,4) };
        broadcastToParty(activePartyId, msgObj);
        displayMessage(activePartyId, "Ich", text, 'me');
        input.value = "";
    }

    function broadcastToParty(partyId, data) {
        parties[partyId].connections.forEach(conn => {
            if(conn.open) conn.send(data);
        });
    }

    function switchParty(id) {
        activePartyId = id;
        document.getElementById('current-party-name').innerText = parties[id].name;
        document.getElementById('messages').innerHTML = `<div class="msg system">Du hast ${parties[id].name} betreten.</div>`;
        updatePartySidebar();
    }

    function updatePartySidebar() {
        const list = document.getElementById('party-list');
        list.innerHTML = "";
        for(let id in parties) {
            const div = document.createElement('div');
            div.className = `party-item ${id === activePartyId ? 'active' : ''}`;
            div.innerText = parties[id].name;
            div.onclick = () => switchParty(id);
            list.appendChild(div);
        }
    }

    function displayMessage(partyId, user, text, type) {
        if(partyId !== activePartyId) return;
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<div class="msg-info">${user}</div>${text}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
