<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Cyber Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --text: #f1f5f9;
            --msg-me: #0369a1;
            --msg-peer: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .messenger-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: var(--card);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Header Bereich */
        header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .status-bar { font-size: 0.75rem; color: var(--primary); margin-bottom: 10px; font-weight: bold; }
        
        .connection-controls { display: flex; gap: 10px; }
        
        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
        }

        button {
            background: var(--primary);
            border: none;
            color: #0f172a;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        /* Chat Bereich */
        #chat-window {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .message.me {
            align-self: flex-end;
            background: var(--msg-me);
            border-bottom-right-radius: 2px;
        }

        .message.peer {
            align-self: flex-start;
            background: var(--msg-peer);
            border-bottom-left-radius: 2px;
        }

        /* Input Bereich */
        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(15, 23, 42, 0.5);
        }

        .input-area input { flex-grow: 1; }

        /* Scrollbar Styling */
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="messenger-container">
    <header>
        <div id="my-id-display" class="status-bar">Initialisiere ID...</div>
        <div class="connection-controls">
            <input type="text" id="peer-id-input" placeholder="Peer ID eingeben...">
            <button onclick="connectToPeer()">Connect</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="message peer">Willkommen! Gib deine ID einem Freund oder verbinde dich mit einer.</div>
    </div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Nachricht schreiben..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Senden</button>
    </div>
</div>

<script>
    let peer = new Peer(); // Erstellt eine zufällige ID
    let conn;
    const chatWindow = document.getElementById('chat-window');
    const myIdDisplay = document.getElementById('my-id-display');
    const messageInput = document.getElementById('message-input');
    const peerIdInput = document.getElementById('peer-id-input');

    // 1. Eigene ID anzeigen
    peer.on('open', (id) => {
        myIdDisplay.innerText = "Deine ID: " + id;
        console.log('Meine Peer-ID ist: ' + id);
    });

    // 2. Eingehende Verbindung empfangen
    peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
        appendMessage('System', 'Verbunden mit Peer!', 'peer');
    });

    // 3. Verbindung zu jemandem aufbauen
    function connectToPeer() {
        const peerId = peerIdInput.value;
        if (peerId) {
            conn = peer.connect(peerId);
            setupConnection();
            appendMessage('System', 'Verbindung wird aufgebaut...', 'me');
        }
    }

    // 4. Daten-Handling (Nachrichten senden/empfangen)
    function setupConnection() {
        conn.on('data', (data) => {
            appendMessage('Peer', data, 'peer');
        });
        
        conn.on('open', () => {
            console.log("Verbindung offen");
        });
    }

    function sendMessage() {
        const msg = messageInput.value;
        if (msg && conn && conn.open) {
            conn.send(msg);
            appendMessage('Ich', msg, 'me');
            messageInput.value = '';
        }
    }

    function appendMessage(sender, text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', type);
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
