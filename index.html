<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Nexus Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --accent: #27272a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: var(--card);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--accent);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Header & ID Area */
        header {
            padding: 24px;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent);
        }

        .my-id-tag {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--accent);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        /* Peer Lobby */
        .lobby {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lobby-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .clear-btn {
            background: none;
            color: #ef4444;
            padding: 0;
            font-size: 0.7rem;
        }
        .clear-btn:hover { background: none; text-decoration: underline; transform: none; }

        #peer-list {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .peer-chip {
            background: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        .peer-chip:hover { border-color: var(--primary); }

        /* Chat Window */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle at 2px 2px, #27272a 1px, transparent 0);
            background-size: 24px 24px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.me {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.peer {
            align-self: flex-start;
            background: var(--accent);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .msg.system {
            align-self: center;
            background: none;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        /* Message Input Area */
        .input-bar {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: var(--card);
            border-top: 1px solid var(--accent);
        }

        /* Custom Scrollbar */
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div id="my-id-display" class="my-id-tag">Warten auf Netzwerk...</div>
        <div class="controls">
            <input type="text" id="peer-id-input" placeholder="Partner ID...">
            <button onclick="connectToPeer()">Connect</button>
            <button onclick="copyInviteLink()" title="Link kopieren">🔗</button>
        </div>
        
        <div class="lobby">
            <div class="lobby-label">
                Letzte Kontakte
                <button class="clear-btn" onclick="clearHistory()">Löschen</button>
            </div>
            <div id="peer-list"></div>
        </div>
    </header>

    <div id="chat-window">
        <div class="msg system">Willkommen im verschlüsselten P2P Chat.</div>
    </div>

    <div class="input-bar">
        <input type="text" id="message-input" placeholder="Nachricht..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Senden</button>
    </div>
</div>

<script>
    let peer = new Peer();
    let conn;
    
    const chatWindow = document.getElementById('chat-window');
    const myIdDisplay = document.getElementById('my-id-display');
    const peerIdInput = document.getElementById('peer-id-input');
    const peerListDiv = document.getElementById('peer-list');
    const messageInput = document.getElementById('message-input');

    // INITIALISIERUNG
    peer.on('open', (id) => {
        myIdDisplay.innerText = "DEINE ID: " + id;
        renderPeerList();
        checkURLParams();
    });

    // EINGEHENDE VERBINDUNG
    peer.on('connection', (connection) => {
        conn = connection;
        savePeerToHistory(conn.peer);
        setupConnection();
    });

    function checkURLParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const autoId = urlParams.get('peer');
        if (autoId) {
            peerIdInput.value = autoId;
            connectToPeer();
        }
    }

    // VERBINDUNGSAUFBAU
    function connectToPeer(targetId = null) {
        const id = targetId || peerIdInput.value;
        if (!id || id === peer.id) return;

        conn = peer.connect(id);
        savePeerToHistory(id);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            appendMessage('System', 'Verbindung hergestellt mit ' + conn.peer, 'system');
        });

        conn.on('data', (data) => {
            appendMessage('Partner', data, 'peer');
        });

        conn.on('close', () => {
            appendMessage('System', 'Verbindung getrennt.', 'system');
        });
    }

    // NACHRICHTEN SENDEN
    function sendMessage() {
        const msg = messageInput.value.trim();
        if (msg && conn && conn.open) {
            conn.send(msg);
            appendMessage('Ich', msg, 'me');
            messageInput.value = '';
        }
    }

    function appendMessage(sender, text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // LOBBY & HISTORY
    function savePeerToHistory(id) {
        let peers = JSON.parse(localStorage.getItem('p2p_history') || '[]');
        if (!peers.includes(id)) {
            peers.push(id);
            localStorage.setItem('p2p_history', JSON.stringify(peers));
            renderPeerList();
        }
    }

    function renderPeerList() {
        const peers = JSON.parse(localStorage.getItem('p2p_history') || '[]');
        peerListDiv.innerHTML = peers.length ? '' : '<span style="font-size:0.7rem; color:var(--text-muted)">Keine aktiven Peers</span>';
        
        peers.forEach(id => {
            const chip = document.createElement('div');
            chip.className = 'peer-chip';
            chip.innerText = id.substring(0, 8) + '...';
            chip.onclick = () => connectToPeer(id);
            peerListDiv.appendChild(chip);
        });
    }

    function clearHistory() {
        localStorage.removeItem('p2p_history');
        renderPeerList();
    }

    function copyInviteLink() {
        const url = `${window.location.origin}${window.location.pathname}?peer=${peer.id}`;
        navigator.clipboard.writeText(url);
        alert("Einladungs-Link kopiert!");
    }
</script>

</body>
</html>
